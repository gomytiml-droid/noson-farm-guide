<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ノーサン 農場ガイド</title>
<style>
  :root {
    --green-deep:#1a3d2b;--green-mid:#2d6a45;--green-light:#4a9463;--green-pale:#e8f2eb;
    --amber:#d4820a;--amber-pale:#fef4e3;--red:#c0392b;--red-pale:#fdecea;
    --blue:#2563a8;--blue-pale:#e8f0fb;--gray:#6b7280;--gray-pale:#f3f4f6;
    --cream:#faf8f4;--white:#ffffff;--text:#1a1a1a;--text-muted:#555;
    --border:#e0dbd0;--shadow:0 2px 8px rgba(0,0,0,0.08);--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:var(--cream);color:var(--text);font-size:15px;line-height:1.65;padding-bottom:40px}
  .site-header{background:var(--green-deep);color:white;padding:18px 20px 14px;position:sticky;top:0;z-index:100}
  .header-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
  .farm-name{font-size:18px;font-weight:700;letter-spacing:.04em}
  .farm-sub{font-size:11px;opacity:.7;margin-top:1px}
  .lang-toggle{display:flex;gap:6px}
  .lang-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;padding:4px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
  .lang-btn.active{background:white;color:var(--green-deep)}
  .tab-nav{background:var(--white);border-bottom:2px solid var(--border);position:sticky;top:62px;z-index:90;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .tab-nav::-webkit-scrollbar{display:none}
  .tab-nav-inner{display:flex;max-width:760px;margin:0 auto;min-width:max-content}
  .tab-btn{padding:14px 16px 12px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:600;color:var(--gray);white-space:nowrap;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;display:flex;align-items:center;gap:5px}
  .tab-btn:hover{color:var(--green-mid)}
  .tab-btn.active{color:var(--green-deep);border-bottom-color:var(--green-deep)}
  .tab-section{display:none}
  .tab-section.active{display:block}
  .content-wrap{max-width:760px;margin:0 auto;padding:24px 16px}
  .card{background:var(--white);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border)}
  .card-title{font-size:15px;font-weight:700;color:var(--green-deep);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--green-pale);display:flex;align-items:center;gap:8px}
  .section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray);margin-bottom:12px;margin-top:24px}
  .section-label:first-child{margin-top:0}
  .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
  .badge-red{background:var(--red-pale);color:var(--red)}
  .badge-amber{background:var(--amber-pale);color:var(--amber)}
  .badge-green{background:var(--green-pale);color:var(--green-mid)}
  .badge-gray{background:var(--gray-pale);color:var(--gray)}
  .badge-blue{background:var(--blue-pale);color:var(--blue)}
  .issue-item{padding:14px 0;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
  .issue-item:last-child{border-bottom:none;padding-bottom:0}
  .issue-head{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
  .issue-title{font-weight:700;font-size:14px;flex:1;min-width:0}
  .issue-body{font-size:13px;color:var(--text-muted);line-height:1.6}
  .issue-action{font-size:12px;font-weight:600;color:var(--green-mid);background:var(--green-pale);padding:4px 10px;border-radius:6px;width:fit-content}
  .change-item{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--border);align-items:flex-start}
  .change-item:last-child{border-bottom:none}
  .change-date{font-size:11px;font-weight:700;color:var(--gray);white-space:nowrap;min-width:60px;padding-top:2px}
  .change-content{flex:1}
  .change-title{font-weight:700;font-size:14px;margin-bottom:4px}
  .change-detail{font-size:13px;color:var(--text-muted)}
  .change-result{font-size:12px;color:var(--amber);font-weight:600;margin-top:4px;padding:3px 8px;background:var(--amber-pale);border-radius:4px;width:fit-content}
  .focus-card{background:var(--green-deep);color:white;border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .focus-label{font-size:11px;font-weight:700;letter-spacing:.08em;opacity:.7;margin-bottom:8px;text-transform:uppercase}
  .focus-text{font-size:15px;font-weight:600;line-height:1.6}
  .focus-items{margin-top:12px;display:flex;flex-direction:column;gap:8px}
  .focus-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;opacity:.9}
  .focus-dot{width:6px;height:6px;background:rgba(255,255,255,.6);border-radius:50%;margin-top:6px;flex-shrink:0}
  .month-hero{background:var(--green-deep);border-radius:var(--radius);padding:24px 20px;margin-bottom:16px;color:white}
  .month-hero-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.7;margin-bottom:6px}
  .month-hero-title{font-size:32px;font-weight:800;letter-spacing:-.01em;margin-bottom:4px}
  .month-hero-season{font-size:13px;opacity:.8;margin-bottom:18px}
  .month-task-list{display:flex;flex-direction:column;gap:10px}
  .month-task{background:rgba(255,255,255,.12);border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
  .month-task-prio{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0}
  .prio-now{background:rgba(192,57,43,.7);color:white}
  .prio-plan{background:rgba(212,130,10,.7);color:white}
  .prio-prep{background:rgba(74,148,99,.6);color:white}
  .month-task-text{font-size:13px;line-height:1.5}
  .year-divider{text-align:center;margin:28px 0 20px;position:relative}
  .year-divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border)}
  .year-divider-label{background:var(--cream);color:var(--gray);font-size:12px;font-weight:700;letter-spacing:.08em;padding:0 14px;position:relative;text-transform:uppercase}
  .year-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(min-width:600px){.year-grid{grid-template-columns:1fr 1fr 1fr}}
  .month-card{background:var(--white);border-radius:10px;padding:14px;border:1px solid var(--border);box-shadow:var(--shadow)}
  .month-card.current{border-color:var(--green-mid);border-width:2px}
  .month-card.summer{border-left:3px solid var(--amber)}
  .month-card.winter{border-left:3px solid var(--blue)}
  .month-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .month-num{font-size:22px;font-weight:800;color:var(--green-deep);line-height:1}
  .month-card.current .month-num{color:var(--green-mid)}
  .month-name-small{font-size:11px;font-weight:600;color:var(--gray)}
  .month-season-badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600}
  .season-spring{background:#e8f5e9;color:#2d7a3a}
  .season-summer{background:var(--amber-pale);color:var(--amber)}
  .season-fall{background:#fff3e0;color:#bf6e00}
  .season-winter{background:var(--blue-pale);color:var(--blue)}
  .current-marker{font-size:10px;background:var(--green-mid);color:white;padding:2px 7px;border-radius:8px;font-weight:700}
  .month-tasks-small{list-style:none;display:flex;flex-direction:column;gap:4px}
  .month-tasks-small li{font-size:12px;color:var(--text-muted);display:flex;gap:6px;align-items:flex-start}
  .month-tasks-small li::before{content:'·';color:var(--green-light);font-weight:700;font-size:14px;line-height:1.2;flex-shrink:0}
  .priority-item{display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--border);align-items:flex-start}
  .priority-item:last-child{border-bottom:none}
  .priority-num{width:36px;height:36px;background:var(--green-deep);color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
  .priority-body{flex:1}
  .priority-title{font-weight:700;font-size:15px;margin-bottom:5px}
  .priority-desc{font-size:13px;color:var(--text-muted);line-height:1.6}
  .vision-placeholder{background:repeating-linear-gradient(-45deg,var(--gray-pale),var(--gray-pale) 4px,var(--white) 4px,var(--white) 14px);border:1px dashed var(--border);border-radius:var(--radius);padding:24px 20px;text-align:center;color:var(--gray);margin-bottom:16px}
  .vision-placeholder-icon{font-size:28px;margin-bottom:8px}
  .vision-placeholder-text{font-size:13px;line-height:1.6}
  .rule-card{background:var(--white);border-radius:var(--radius);padding:18px 20px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border);border-left-width:4px}
  .rule-card.confirmed{border-left-color:var(--green-mid)}
  .rule-card.trial{border-left-color:var(--amber)}
  .rule-card.reviewing{border-left-color:var(--gray)}
  .rule-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;flex-wrap:wrap}
  .rule-id{font-size:11px;font-weight:700;color:var(--gray);background:var(--gray-pale);padding:2px 8px;border-radius:6px;flex-shrink:0}
  .rule-title{font-weight:700;font-size:14px;flex:1}
  .rule-why{font-size:13px;color:var(--text-muted);margin-bottom:8px;line-height:1.6}
  .rule-action{font-size:12px;color:var(--green-mid);font-weight:600;background:var(--green-pale);padding:4px 10px;border-radius:6px;width:fit-content}
  .rule-divider-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--gray);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
  .rule-divider-label::after{content:'';flex:1;height:1px;background:var(--border)}
  .shelf-nav{display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:4px;margin-bottom:16px}
  .shelf-nav::-webkit-scrollbar{display:none}
  .shelf-btn{background:var(--white);border:1.5px solid var(--border);padding:8px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray);white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:5px}
  .shelf-btn.active{background:var(--green-deep);border-color:var(--green-deep);color:white}
  .shelf-section{display:none}
  .shelf-section.active{display:block}
  .book-card{background:var(--white);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;box-shadow:var(--shadow);border:1px solid var(--border);display:flex;gap:14px;align-items:flex-start}
  .book-icon{font-size:28px;flex-shrink:0;width:48px;height:48px;background:var(--green-pale);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .book-body{flex:1}
  .book-title{font-weight:700;font-size:14px;margin-bottom:4px}
  .book-desc{font-size:12px;color:var(--text-muted);line-height:1.5}
  .book-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:6px;background:var(--green-pale);color:var(--green-mid);margin-top:6px}
  .shelf-empty{border:1.5px dashed var(--border);border-radius:var(--radius);padding:32px 20px;text-align:center;color:var(--gray)}
  .shelf-empty-icon{font-size:32px;margin-bottom:10px}
  .shelf-empty-text{font-size:13px;line-height:1.6}
  .warn-box{background:var(--amber-pale);border-left:3px solid var(--amber);border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;color:#7a4a00;margin-top:10px;line-height:1.6}
  .info-box{background:var(--blue-pale);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:12px 14px;font-size:13px;color:#1a3d6b;margin-top:10px;line-height:1.6}
  .data-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
  .data-table th{background:var(--green-pale);color:var(--green-deep);font-weight:700;padding:8px 10px;text-align:left;font-size:12px}
  .data-table td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text-muted)}
  .data-table tr:last-child td{border-bottom:none}
  [lang="en"] .jp-only{display:none}
  [lang="ja"] .en-only{display:none}
  @media(max-width:480px){.tab-btn{padding:12px 12px 10px;font-size:12px}.month-hero-title{font-size:26px}.year-grid{grid-template-columns:1fr 1fr}.content-wrap{padding:16px 12px}}
</style>
</head>

<!-- ===================== RENDERING ENGINE ===================== -->
<script>
const D = JSON.parse(document.getElementById('farm-data').textContent);
const L = () => document.body.getAttribute('lang') === 'en' ? 'en' : 'jp';
const t = (obj, key) => obj[key + '_' + L()] ?? obj[key + '_jp'] ?? '';
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';

// ── UTILS ──────────────────────────────────────────────
function badgeClass(priority) {
  return {critical:'badge-red', high:'badge-amber', important:'badge-amber'}[priority] ?? 'badge-gray';
}
function statusBadge(status, lang) {
  const map = {
    confirmed: {jp:'確定ルール', en:'Confirmed'},
    trial:     {jp:'試験中',     en:'Trial'},
    reviewing: {jp:'検討中',     en:'Under Review'}
  };
  const cls = {confirmed:'badge-green', trial:'badge-amber', reviewing:'badge-gray'}[status] ?? 'badge-gray';
  return `<span class="badge ${cls}">${map[status]?.[lang] ?? status}</span>`;
}
function seasonBadge(season, label) {
  return `<span class="month-season-badge season-${season}">${esc(label)}</span>`;
}

// ── TAB 1: 今の農場 ────────────────────────────────────
function renderTab1() {
  const d = D.tab1;
  const l = L();

  // Focus card
  const items = d.focus.items.map(i => `
    <div class="focus-item"><div class="focus-dot"></div><span>${esc(i[l])}</span></div>`).join('');

  // Recent changes
  const changes = d.recent_changes.map(c => `
    <div class="change-item">
      <div class="change-date">${esc(c.date)}</div>
      <div class="change-content">
        <div class="change-title">${esc(c['title_'+l])}</div>
        <div class="change-detail">${esc(c['detail_'+l])}</div>
        ${c['result_'+l] ? `<div class="change-result">${esc(c['result_'+l])}</div>` : ''}
      </div>
    </div>`).join('');

  // Active issues
  const issues = d.active_issues.map(i => `
    <div class="issue-item">
      <div class="issue-head">
        <span class="badge ${badgeClass(i.priority)}">${esc(i['badge_'+l])}</span>
        <div class="issue-title">${esc(i['title_'+l])}</div>
      </div>
      <div class="issue-body">${esc(i['body_'+l])}</div>
      ${i['action_'+l] ? `<div class="issue-action">${esc(i['action_'+l])}</div>` : ''}
    </div>`).join('');

  // Near term table
  const rows = d.near_term.map(n => `
    <tr>
      <td>${esc(n['action_'+l])}</td>
      <td>${esc(n['deadline_'+l])}</td>
      <td>${esc(n['cost_'+l])}</td>
    </tr>`).join('');
  const [th1,th2,th3] = l==='en'
    ? ['Action','Target','Cost']
    : ['アクション','期限の目安','費用'];

  document.getElementById('content-tab1').innerHTML = `
    <div class="focus-card">
      <div class="focus-label">🎯 ${l==='en'?"Manager's Current Focus / "+t(d.focus,'period'):"山岸の今の関心事 / "+t(d.focus,'period')}</div>
      <div class="focus-text">${esc(t(d.focus,'summary'))}</div>
      <div class="focus-items">${items}</div>
    </div>
    <div class="section-label">${l==='en'?'Recent Changes':'最近の変化・出来事'}</div>
    <div class="card">${changes}</div>
    <div class="section-label">${l==='en'?'Current Problems':'今抱えている課題'}</div>
    <div class="card">${issues}</div>
    <div class="section-label">${l==='en'?'Near-Term Actions':'近々に解決すべきアクション'}</div>
    <div class="card">
      <table class="data-table">
        <tr><th>${th1}</th><th>${th2}</th><th>${th3}</th></tr>
        ${rows}
      </table>
    </div>`;
}

// ── TAB 2: 年間スケジュール ───────────────────────────
function renderTab2() {
  const d = D.tab2;
  const l = L();
  const currentMonth = new Date().getMonth() + 1;
  const heroMonth = d.hero.month;

  // Hero tasks
  const prioLabel = {now:{jp:'今すぐ',en:'Now'},plan:{jp:'今月中',en:'This month'},prep:{jp:'準備',en:'Prep'}};
  const heroTasks = d.hero.tasks.map(t2 => `
    <div class="month-task">
      <span class="month-task-prio prio-${t2.priority}">${prioLabel[t2.priority]?.[l] ?? t2.priority}</span>
      <div class="month-task-text">${esc(t2[l])}</div>
    </div>`).join('');

  // Annual grid — order from hero+1 to hero-1 (wrapping), skip hero month
  const order = [];
  for (let i = 1; i <= 12; i++) {
    const m = ((heroMonth - 1 + i) % 12) + 1;
    if (m !== heroMonth) order.push(m);
  }

  // Split into this year / next year
  const thisYear = [], nextYear = [];
  let crossed = false;
  order.forEach(m => {
    if (m < heroMonth && !crossed) { crossed = true; }
    if (crossed) nextYear.push(m); else thisYear.push(m);
  });

  function monthCard(m) {
    const info = d.annual[String(m)];
    if (!info) return '';
    const isCurrent = m === currentMonth;
    const cls = [
      'month-card',
      isCurrent ? 'current' : '',
      info.season === 'summer' ? 'summer' : '',
      info.season === 'winter' ? 'winter' : ''
    ].filter(Boolean).join(' ');
    const badge = isCurrent
      ? `<span class="current-marker">${l==='en'?'NOW':'今月'}</span>`
      : seasonBadge(info.season, info['label_'+l]);
    const tasks = (info['tasks_'+l] || []).map(t2 => `<li>${esc(t2)}</li>`).join('');
    const mName = l==='en'
      ? ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]
      : m+'月';
    return `
      <div class="${cls}">
        <div class="month-card-head">
          <div><div class="month-num">${m}</div><div class="month-name-small">${mName}</div></div>
          ${badge}
        </div>
        <ul class="month-tasks-small">${tasks}</ul>
      </div>`;
  }

  const yr = new Date().getFullYear();
  const gridThis = thisYear.map(monthCard).join('');
  const gridNext = nextYear.map(monthCard).join('');
  const nextLabel = l==='en' ? `Next Year (${yr+1})` : `来年（${yr+1}年）`;
  const annualLabel = l==='en' ? `Full Year Schedule ${yr}` : `年間スケジュール（${yr}年）`;

  document.getElementById('content-tab2').innerHTML = `
    <div class="month-hero">
      <div class="month-hero-label">${l==='en'?"THIS MONTH'S FOCUS":"今月のタスク"}</div>
      <div class="month-hero-title">${esc(d.hero['title_'+l])}</div>
      <div class="month-hero-season">${esc(d.hero['subtitle_'+l])}</div>
      <div class="month-task-list">${heroTasks}</div>
    </div>
    <div class="year-divider"><span class="year-divider-label">${annualLabel}</span></div>
    <div class="year-grid">${gridThis}</div>
    ${nextYear.length ? `
      <div class="year-divider" style="margin-top:24px"><span class="year-divider-label">${nextLabel}</span></div>
      <div class="year-grid">${gridNext}</div>` : ''}`;
}

function renderTab3() {
  const d = D.tab3;

  const visionHtml = d['vision_'+l]

// ── TAB 4: 品種別ケア ──────────────────────────────────
function renderTab4() {
  const d = D.tab4;
  const l = L();

  function riskBadgeClass(type) {
    return {red:'badge-red',amber:'badge-amber',blue:'badge-blue',gray:'badge-gray'}[type]??'badge-gray';

  function buildVariety(key) {
    const v = d[key];

        <td>${esc(p['item_'+l])}</td>
        <td>${p.strong ? `<strong>${esc(p['val_'+l])}</strong>` : esc(p['val_'+l])}</td>

    const risks = v.risks ? v.risks.map(r => `

        <div class="issue-head">
          <span class="badge ${riskBadgeClass(r.type)}">${esc(r['label_'+l])}</span>
          <div class="issue-title">${esc(r['title_'+l])}</div>
        </div>
        <div class="issue-body">${esc(r['body_'+l])}</div>

    let rootRotHtml = '';
    if (v.root_rot) {

          <td>${esc(s['desc_'+l])}</td>

      // Re-do cause numbering properly
      const causeHtml = rr.causes.map((c,i) => `
        <div class="issue-item" style="${i===rr.causes.length-1?'border-bottom:none;padding-bottom:0':''}">
          <div class="issue-body">${['①','②','③'][i]} ${esc(c[l])}</div>

    return `

          ${statusBadge(r.status, l)}
        </div>
        <div class="rule-why"><strong>${l==='en'?'Why:':'なぜか：'}</strong> ${esc(r['why_'+l])}</div>
        ${r['action_'+l] ? `<div class="rule-action">${esc(r['action_'+l])}</div>` : ''}
      </div>`).join('');
    return `
      <div class="rule-divider-label">${esc(cat['label_'+l])}</div>
      ${rules}`;
  }).join('');

  document.getElementById('content-tab5').innerHTML = `
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;line-height:1.7">
      ${l==='en'
        ? 'This is not a procedure manual. It\'s a guide for understanding <strong>why each rule exists</strong> — so you can act as a professional with your own judgment.'
        : 'これはやり方の手順書ではない。<strong>なぜそのルールが存在するか</strong>を理解し、プロとして自分の判断で動くためのガイドだ。'}
    </p>
    ${html}`;
}

// ── TAB 6: 本棚 ──────────────────────────────────────
function renderTab6() {
  const d = D.tab6;
  const l = L();

  const shelfDefs = [
    {key:'cultivation', icon:'🌱', jp:'栽培技術', en:'Cultivation'},
    {key:'market',      icon:'📊', jp:'市場・営業', en:'Market'},
    {key:'business',    icon:'💼', jp:'経営',      en:'Business'},
    {key:'challenge',   icon:'🚀', jp:'挑戦・ポテンシャル', en:'Challenge'}
  ];

  const emptyMsg = {
    cultivation:{jp:'栽培に関する発見・研究・経験則などを追加していきます。',en:'Add cultivation discoveries, research, and practical insights.'},
    market:     {jp:'市場・販売・バイヤー目線の知識をここに蓄積。',en:'Market intelligence, buyer perspectives, and sales insights.'},
    business:   {jp:'農場経営・コスト・人材・設備投資の知見をここに蓄積。',en:'Farm management, cost control, team building, investment decisions.'},
    challenge:  {jp:'「自分たちにはできる」という根拠を集める棚。',en:'Evidence that we can do more. Challenges taken on, sources of inspiration.'}
  };

  function buildShelf(key) {
    const items = d[key] || [];
    if (!items.length) return `
      <div class="shelf-empty">
        <div class="shelf-empty-icon">${shelfDefs.find(s=>s.key===key)?.icon||'📖'}</div>
        <div class="shelf-empty-text">${emptyMsg[key]?.[l]||''}</div>
      </div>`;
    return items.map(item => `
      <div class="book-card">
        <div class="book-icon">${item.icon||'📖'}</div>
        <div class="book-body">
          <div class="book-title">${esc(item['title_'+l])}</div>
          <div class="book-desc">${esc(item['desc_'+l])}</div>
          <span class="book-tag">${esc(item['tag_'+l])}</span>
        </div>
      </div>`).join('');
  }

  const navBtns = shelfDefs.map((s,i) => `
    <button class="shelf-btn${i===0?' active':''}" onclick="showShelf('shelf-${s.key}')" id="snav-${s.key}">
      ${s.icon} ${s[l]}
    </button>`).join('');

  const sections = shelfDefs.map((s,i) => `
    <div class="shelf-section${i===0?' active':''}" id="shelf-${s.key}">
      ${buildShelf(s.key)}
    </div>`).join('');

  document.getElementById('content-tab6').innerHTML = `
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:16px;line-height:1.7">
      ${l==='en'
        ? 'A shared library for professional growth at NOSON — knowledge in cultivation, business, markets, and challenges.'
        : 'スプラウト農場で働くプロとして知識を深めるための本棚。栽培・経営・市場・挑戦、それぞれに知見を蓄積していく。'}
    </p>
    <div class="shelf-nav">${navBtns}</div>
    ${sections}`;
}

// ── CONTROLS ──────────────────────────────────────────
const TAB_DEFS = [
  {id:'tab1', icon:'🌾', jp:'今の農場',       en:'Farm Now'},
  {id:'tab2', icon:'📅', jp:'年間スケジュール', en:'Schedule'},
  {id:'tab3', icon:'🧭', jp:'ビジョン・ポリシー', en:'Vision'},
  {id:'tab4', icon:'🌿', jp:'品種別ケア',     en:'Varieties'},
  {id:'tab5', icon:'📋', jp:'アクションルール', en:'Rules'},
  {id:'tab6', icon:'📚', jp:'本棚',           en:'Library'}
];

function buildNav() {
  const l = L();
  document.getElementById('tab-nav-inner').innerHTML = TAB_DEFS.map((t2,i) => `
    <button class="tab-btn${i===0?' active':''}" onclick="showTab('${t2.id}')" id="nav-${t2.id}">
      <span>${t2.icon}</span> ${t2[l]}
    </button>`).join('');
  document.getElementById('hd-name-jp').textContent = D.meta.farm_jp;
  document.getElementById('hd-name-en').textContent = D.meta.farm_en;
  document.getElementById('hd-sub-jp').textContent  = D.meta.sub_jp;
  document.getElementById('hd-sub-en').textContent  = D.meta.sub_en;
}

function showTab(tabId) {
  document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  document.getElementById('nav-'+tabId).classList.add('active');
}

function showVariety(key) {
  document.querySelectorAll('[id^="variety-"]').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('[id^="vnav-"]').forEach(b => b.classList.remove('active'));
  document.getElementById('variety-'+key).classList.add('active');
  document.getElementById('vnav-'+key).classList.add('active');
}

function showShelf(shelfId) {
  document.querySelectorAll('[id^="shelf-"]').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('[id^="snav-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(shelfId).classList.add('active');
  document.getElementById('snav-'+shelfId.replace('shelf-','')).classList.add('active');
}

function setLang(lang) {
  document.body.setAttribute('lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderAll();
  buildNav();
}

function renderAll() {
  renderTab1(); renderTab2(); renderTab3();
  renderTab4(); renderTab5(); renderTab6();
}

// ── INIT ──────────────────────────────────────────────
buildNav();
renderAll();
</script>
</body>
</html>
