<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>農場メモ</title>
<!-- ホーム画面アイコン用 -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="農場メモ">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Hiragino Sans', sans-serif;
  background: #1a3d16;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  background: #fff;
  border-radius: 20px;
  padding: 32px 24px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}
.icon { font-size: 3.5rem; margin-bottom: 10px; }
h1 { font-size: 1.3rem; color: #2d5a27; font-weight: 700; margin-bottom: 4px; }
.sub { font-size: .82rem; color: #999; margin-bottom: 24px; }

.loader {
  width: 48px; height: 48px;
  border: 4px solid #e8f5e8;
  border-top-color: #2d5a27;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.msg { font-size: .9rem; color: #555; margin-bottom: 20px; }

.btn {
  display: block;
  width: 100%;
  padding: 15px;
  border-radius: 14px;
  font-size: .95rem;
  font-weight: 700;
  cursor: pointer;
  border: none;
  text-decoration: none;
  color: #fff;
  background: #2d5a27;
  margin-bottom: 10px;
}
.btn-sub {
  display: block;
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  font-size: .82rem;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid #c8e6c8;
  text-decoration: none;
  color: #2d5a27;
  background: #f0f7f0;
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🌱</div>
  <h1>農場メモ</h1>
  <p class="sub">Gmailを起動しています…</p>
  <div class="loader" id="loader"></div>
  <p class="msg" id="msg">そのまみしばらくお待ちください</p>
  <a class="btn" id="btn-open" href="#" style="display:none">📧 手動で開く</a>
  <a class="btn-sub" href="https://gomytiml-droid.github.io/noson-farm-guide/" style="display:none" id="btn-guide">📖 知識ベース</a>
</div>

<script>
function buildGmailUrl() {
  const now  = new Date();
  const ymd  = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
  const hm   = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const sub  = encodeURIComponent(`[農場メモ] ${ymd}`);
  const body = encodeURIComponent(
    `${ymd} ${hm}\n\n`
  );
  return `https://mail.google.com/mail/?view=cm&to=gomytiml%40gmail.com&su=${sub}&body=${body}`;
}

const url = buildGmailUrl();

// 自動リダイレクト（0.4秒後）
setTimeout(() => {
  window.location.href = url;
}, 400);

// 3秒後に手動ボタンを表示（自動が失敗した場合の保険）
setTimeout(() => {
  document.getElementById('loader').style.display = 'none';
  document.getElementById('msg').textContent = '自動で開かない場合はボタンをタップ';
  const btnOpen  = document.getElementById('btn-open');
  const btnGuide = document.getElementById('btn-guide');
  btnOpen.href    = url;
  btnOpen.style.display  = 'block';
  btnGuide.style.display = 'block';
}, 3000);
</script>
</body>
</html>
